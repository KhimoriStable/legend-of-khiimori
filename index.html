<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend of Khiimori — Племенная книга</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>🐴 Legend of Khiimori</h1>
        <p>Племенная книга</p>
    </header>

    <main>

        <section class="stats">

            <div class="card">
                <h2>Всего лошадей</h2>
                <p>1</p>
            </div>

            <div class="card">
                <h2>Готовы к разведению</h2>
                <p>1</p>
            </div>

            <div class="card">
                <h2>Не готовы</h2>
                <p>0</p>
            </div>

        </section>

        <section class="horses">

            <h2>Лошади</h2>

            <div class="horse-card">

                <h3>Хавар</h3>

                <p>ID: H001</p>

                <p>Ферганская</p>

                <p>Статус: ✅ Готов к разведению</p>

            </div>

        </section>

    </main>

</body>
</html>
